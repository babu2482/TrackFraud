name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DATABASE_URL: "postgresql://trackfraud:trackfraud_dev_password@localhost:5432/trackfraud_test"
  REDIS_URL: "redis://localhost:6379"
  MEILISEARCH_URL: "http://localhost:7700"
  MEILISEARCH_API_KEY: "test-master-key"
  NODE_ENV: test

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: trackfraud_test
          POSTGRES_USER: trackfraud
          POSTGRES_PASSWORD: trackfraud_dev_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      meilisearch:
        image: getmeili/meilisearch:v1.10
        env:
          MEILI_MASTER_KEY: test-master-key
        options: >-
          --health-cmd "curl -f http://localhost:7700/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 7700:7700

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate reset --force
        env:
          DATABASE_URL: "postgresql://trackfraud:trackfraud_dev_password@localhost:5432/trackfraud_test"

      - name: Run linter
        run: npm run lint -- --max-warnings=0

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check for known vulnerabilities
        run: npm audit --audit-level=moderate || true