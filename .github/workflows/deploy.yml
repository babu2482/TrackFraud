name: Deploy to Production

on:
  push:
    tags:
      - 'v*'

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  MEILISEARCH_URL: ${{ secrets.MEILISEARCH_URL }}
  MEILISEARCH_API_KEY: ${{ secrets.MEILISEARCH_API_KEY }}
  REDIS_URL: ${{ secrets.REDIS_URL }}

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js application
        run: npm run build

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # Add deployment steps for your hosting platform
      # Example for Vercel:
      # - name: Deploy to Vercel
      #   uses: amondnet/vercel-action@v25
      #   with:
      #     vercel-token: ${{ secrets.VERCEL_TOKEN }}
      #     vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
      #     vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
      #     vercel-args: '--prod'

      # Example for self-hosted Docker deployment:
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            trackfraud:${{ github.ref_name }}
            trackfraud:latest
          secrets: |
            "DATABASE_URL=${{ secrets.DATABASE_URL }}"

  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    steps:
      - name: Log successful deployment
        run: echo "Deployment completed successfully for tag ${{ github.ref_name }}"
